plugins {
    id 'com.android.application'
}
android {
    namespace "ru.voicenote.app"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "ru.voicenote.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 6
        versionName "1.5.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    // Note: the Yandex Mediation adapters (IronSource, Pangle, Tapjoy, etc.) require
    // compileOptions of at least Java 8. capacitor.build.gradle (applied below, and
    // regenerated by `cap update` — never edit it directly) already sets Java 17 for
    // this module, which satisfies that minimum, so no override is added here.

    // Bundling this many third-party mediation network SDKs commonly causes
    // "more than one file was found with OS independent path 'META-INF/...'"
    // build failures from duplicate license/notice files across their AARs.
    packagingOptions {
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/LICENSE.txt'
        exclude 'META-INF/license.txt'
        exclude 'META-INF/NOTICE'
        exclude 'META-INF/NOTICE.txt'
        exclude 'META-INF/notice.txt'
        exclude 'META-INF/ASL2.0'
        exclude 'META-INF/*.kotlin_module'
    }
}
repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}
dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation "androidx.lifecycle:lifecycle-process:2.8.7"

    // Yandex Mobile Ads SDK — plain package, no third-party mediation adapters.
    // Only a Yandex account is configured for this app; mobileads-mediation
    // bundled adapters for a dozen networks (IronSource, Pangle, Tapjoy,
    // Mintegral, Chartboost, AppNext, Google, InMobi, MyTarget, UnityAds,
    // AppLovin, Vungle, BigoAds) with none of them actually usable, which
    // bloated APK size and install time with unused native libraries for no
    // benefit. The banner and app open ad code is unaffected — it's the same
    // core SDK classes either way, mediation is purely additive.
    implementation 'com.yandex.android:mobileads:8.2.0'
}
apply from: 'capacitor.build.gradle'
try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
